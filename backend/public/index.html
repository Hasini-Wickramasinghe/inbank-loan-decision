<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan Checker</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>Loan Checker</h2>

<input type="text" id="personalCode" placeholder="Personal Code"><br><br>
<input type="number" id="amount" placeholder="Loan Amount"><br><br>
<input type="number" id="period" placeholder="Loan Period (months)"><br><br>
<button onclick="checkLoan()">Check Loan</button>

<p id="result"></p>

<script>
async function checkLoan() {
    const personalCode = document.getElementById("personalCode").value;
    const amount = Number(document.getElementById("amount").value);
    const period = Number(document.getElementById("period").value);

    const result = document.getElementById("result");
    result.innerText = "Checking...";

    try {
        const response = await fetch("/api/loan", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ personalCode, amount, period })
        });

        const data = await response.json();

        if (!response.ok) {
            result.innerText = "Error: " + data.error;
            return;
        }

        result.innerText = 
            "Decision: " + data.decision +
            " | Amount: " + data.amount +
            " | Period: " + data.period;

    } catch (err) {
        result.innerText = "Cannot connect to server";
    }
}
</script>

</body>
</html>
